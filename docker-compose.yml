services:
  postgres:
    image: postgres:16-alpine
    container_name: polyglot-postgres
    environment:
      POSTGRES_DB: polyglot_dev
      POSTGRES_USER: polyglot
      POSTGRES_PASSWORD: polyglot_local_password
    ports:
      - "5432:5432"
    volumes:
      - polyglot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polyglot -d polyglot_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: polyglot-redis
    ports:
      - "6379:6379"
    volumes:
      - polyglot_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  polyglot_postgres_data:
  polyglot_redis_data:
